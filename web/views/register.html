<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - 𝕹𝖊𝖝𝖚𝖘 𝕭𝖔𝖙 Web Manager</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo flex-center" style="margin-bottom: 24px;">
          <div class="logo-icon">
            <img src="/images/bot-logo.png" alt="Nexus Bot"
              style="width: 32px; height: 32px; border-radius: 8px; object-fit: cover;">
          </div>
          <span>𝕹𝖊𝖝𝖚𝖘 𝕭𝖔𝖙</span>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register to start managing WhatsApp</p>
      </div>

      <div id="alert-container"></div>

      <form id="register-form">
        <div class="form-group floating-label-group has-icon">
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="first-name" class="form-input has-icon" placeholder=" " autocomplete="given-name">
            <label for="first-name" class="floating-label">First Name (Optional)</label>
          </div>
        </div>

        <div class="form-group floating-label-group has-iti">
          <div class="input-wrapper">
            <input type="tel" id="phone-number" class="form-input" placeholder=" " required autocomplete="tel">
            <label for="phone-number" class="floating-label">Phone Number</label>
          </div>
          <small
            style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 4px; display: block; padding-left: 4px;">
            Select your country flag
          </small>
        </div>

        <div class="form-group floating-label-group has-icon">
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-input has-icon" placeholder=" " required
              autocomplete="new-password">
            <label for="password" class="floating-label">Password</label>
            <button type="button" class="password-toggle" data-target="password" title="Toggle password visibility">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group floating-label-group has-icon">
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input type="password" id="confirm-password" class="form-input has-icon" placeholder=" " required
              autocomplete="new-password">
            <label for="confirm-password" class="floating-label">Confirm Password</label>
            <button type="button" class="password-toggle" data-target="confirm-password"
              title="Toggle password visibility">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="register-btn" class="btn btn-primary btn-block btn-lg" style="margin-top: 10px;">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/login" class="auth-link">Login here</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js" async></script>
  <script src="../js/theme.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
